<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkSynth | Pro Builder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="auth-overlay" class="overlay">
        <div class="card auth-card">
            <h2>LinkSynth Login</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <button id="loginBtn">Login</button>
            <button id="registerBtn" class="secondary">Register</button>
        </div>
    </div>

    <header>
        <div class="user-bar"><span id="user-display">Connecting...</span> <button id="logoutBtn" style="display:none">Logout</button></div>
        <h1>LinkSynth Builder</h1>
    </header>

    <main class="container">
        <section class="card toolbar">
            <div class="input-group">
                <select id="shapeSelect">
                    <option value="shape-rect">Rectangle</option>
                    <option value="shape-circle">Circle</option>
                </select>
                <button id="addShapeBtn">Insert Shape</button>
                <button id="addTextBtn">Add Text</button>
                <button onclick="document.getElementById('imgUpload').click()">+ Upload Image</button>
                <input type="file" id="imgUpload" style="display:none" accept="image/*">
            </div>
            <div class="controls">
                <button class="mode-btn" data-mode="light">Light Mode</button>
                <button class="mode-btn" data-mode="dark">Dark Mode</button>
                <button id="saveCloudBtn" style="background: var(--accent);">Save to Cloud</button>
                <button id="exportPngBtn" style="background: #6366f1;">Export PNG</button>
            </div>
        </section>

        <div id="canvas-container">
            <div id="canvas" class="light">
                 <p class="placeholder">Drag assets here...</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
