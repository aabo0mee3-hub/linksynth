<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkSynth | Prototyping Machine</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <header>
        <h1>LinkSynth Builder</h1>
        <p>Rapid Canvas Mockups & AI Profiling</p>
    </header>

    <main class="container">
        <section class="card toolbar">
            <div class="input-group">
                <select id="shapeSelect">
                    <option value="shape-rect">Square Section</option>
                    <option value="shape-circle">Profile Circle</option>
                </select>
                <button id="addShapeBtn">Insert Shape</button>
                <button id="addTextBtn">Add Text</button>
                <button onclick="document.getElementById('imgUpload').click()">+ Upload Image</button>
                <input type="file" id="imgUpload" style="display:none" accept="image/*">
            </div>
            <div class="theme-controls">
                <button class="mode-btn" data-mode="light">Light</button>
                <button class="mode-btn" data-mode="dark">Dark</button>
                <button id="exportBtn" style="background: var(--accent);">📸 Save as PNG</button>
                <button id="saveCloudBtn">☁️ Sync to Cloud</button>
            </div>
        </section>

        <div id="canvas-container" class="card">
            <div id="canvas" class="light">
                 <p class="placeholder-text">Drag objects here. Changes are saved to Supabase.</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
