<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkSynth | AI Prototyper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>LinkSynth Builder</h1>
        <p>AI-Powered Layout Profiling & Rapid Mockups</p>
    </header>

    <main class="container">
        <section class="card">
            <h3>1. AI Site-to-Canvas</h3>
            <div class="input-group">
                <input type="text" id="aiUrlInput" placeholder="Paste URL to Analyze...">
                <button id="aiAnalyzeBtn">Analyze Site</button>
                <button id="snapshotBtn" style="background: var(--accent);">Take Canvas Snapshot</button>
            </div>
            <div id="aiStatus" class="status-msg"></div>
        </section>

        <section class="card">
            <h3>2. Manual Adjustments</h3>
            <div class="input-group">
                <button class="shape-btn" data-shape="rect">Add Section</button>
                <button class="shape-btn" data-shape="circle">Add Profile</button>
                <button id="addTextBtn">Add Text</button>
                <button onclick="document.getElementById('imageImporter').click()">+ Upload Image</button>
                <input type="file" id="imageImporter" style="display:none" accept="image/*">
            </div>
            <div class="theme-toggle">
                <button class="theme-btn" data-theme="light">Light Mode</button>
                <button class="theme-btn" data-theme="dark">Dark Mode</button>
            </div>
        </section>

        <div class="action-bar">
            <button id="launchDummyBtn">🌐 Launch Dummy Page</button>
            <button id="clearCanvasBtn" style="background: #ef4444;">Clear</button>
        </div>

        <div id="canvas" class="light"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
