<main class="container">
    <section class="card">
        <div class="input-group">
            <input type="text" id="textInput" placeholder="New text box content...">
            <button id="addTextBtn">Add Text</button>
            <button onclick="document.getElementById('imageImporter').click()">+ Import Image</button>
            <input type="file" id="imageImporter" style="display:none" accept="image/*">
            <button id="exportBtn" style="background: var(--accent);">Export CSS</button>
        </div>
    </section>

    <section class="card">
        <h3>Workspace Presets</h3>
        <div class="input-group">
            <button class="preset-btn" data-theme="minimal">Minimal</button>
            <button class="preset-btn" data-theme="glass">Glass</button>
            <button class="preset-btn" data-theme="dark">Midnight</button>
            <button class="preset-btn" data-theme="retro">Terminal</button>
        </div>
    </section>

    <section class="card">
        <div class="input-group">
            <input type="text" id="gifSearch" placeholder="Search Tenor GIFs...">
            <button id="searchGifBtn">Search Tenor</button>
        </div>
        <div id="gifResults" class="gif-scroll"></div>
    </section>

    <div id="canvas-wrapper">
        <div id="canvas">
            <p class="placeholder-text">Workspace Active: Import images or add text.</p>
        </div>
    </div>
</main>
