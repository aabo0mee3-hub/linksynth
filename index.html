<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkSynth | AI Prototyper</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <header>
        <h1>LinkSynth Builder</h1>
    </header>

    <main class="container">
        <section class="card">
            <div class="input-group">
                <select id="shapeSelect">
                    <option value="shape-rect">Section (Box)</option>
                    <option value="shape-circle">Profile (Circle)</option>
                </select>
                <button id="addShapeBtn">Insert Shape</button>
                <button id="addTextBtn">Add Text</button>
                <button onclick="document.getElementById('imageImporter').click()">+ Upload Image</button>
                <input type="file" id="imageImporter" style="display:none" accept="image/*">
            </div>
            <div class="theme-toggle">
                <button class="mode-btn" data-mode="light">Light Mode</button>
                <button class="mode-btn" data-mode="dark">Dark Mode</button>
                <button id="launchDummyBtn" style="background: var(--accent);">🌐 Launch & Export</button>
                <button id="clearCanvasBtn" style="background: #ef4444;">Clear</button>
            </div>
        </section>

        <div id="canvas" class="light">
             <p class="placeholder-text">Concept Area: Drag shapes and text here.</p>
        </div>

        <section class="card" style="margin-top: 20px;">
            <h3>AI Layout Refiner</h3>
            <div class="input-group">
                <input type="text" id="aiUrlInput" placeholder="Enter URL or prompt for AI iteration...">
                <button id="aiAnalyzeBtn">Analyze/Refine</button>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
