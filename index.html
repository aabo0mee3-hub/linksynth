<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkSynth | Secure Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-overlay" class="overlay">
        <div class="card auth-card">
            <h2 id="auth-title">Welcome to LinkSynth</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <div class="input-group">
                <button id="loginBtn">Login</button>
                <button id="registerBtn" class="secondary">Register</button>
            </div>
            <p id="auth-msg"></p>
        </div>
    </div>

    <header>
        <div class="user-bar">
            <span id="user-display">Not Logged In</span>
            <button id="logoutBtn" style="display:none">Logout</button>
        </div>
        <h1>LinkSynth Builder</h1>
    </header>

    <main class="container">
        <section id="input-area" class="card">
            <h3>Add New Asset Link</h3>
            <div class="input-group">
                <input type="text" id="linkInput" placeholder="https://example.com/asset">
                <select id="assetType">
                    <option value="theme">Theme/CSS</option>
                    <option value="image">Image Asset</option>
                </select>
                <button id="addBtn">Save to Cloud</button>
            </div>
        </section>

        <section id="canvas-area" class="card">
            <div id="canvas" class="light">
                 <p class="placeholder-text">Your secure wireframes will appear here.</p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
