<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkSynth Pro | Rapid Mockup Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>LinkSynth Pro</h1>
        <p>Design, drag, and export your website mockup code instantly.</p>
    </header>

    <main class="container">
        <section class="card">
            <h3>Text & Export Tools</h3>
            <div class="input-group">
                <input type="text" id="textInput" placeholder="Enter headline or button text...">
                <button id="addTextBtn">Create Text Box</button>
                <button id="exportBtn" style="background: #10b981;">Export Mockup Code</button>
            </div>
        </section>

        <section class="card">
            <h3>Layout Presets</h3>
            <div class="input-group">
                <button class="preset-btn" data-theme="minimal">Minimalist</button>
                <button class="preset-btn" data-theme="glass">Glassmorphism</button>
                <button class="preset-btn" data-theme="dark">Midnight</button>
                <button class="preset-btn" data-theme="retro">Terminal</button>
            </div>
        </section>

        <section class="card">
            <div class="input-group">
                <input type="text" id="linkInput" placeholder="https://...">
                <button id="addBtn">Add Link</button>
            </div>
            <div id="linkList" class="grid"></div>
            <div class="gif-search-box">
                <input type="text" id="gifSearch" placeholder="Search Giphy...">
                <button id="searchGifBtn">Find GIFs</button>
            </div>
            <div id="gifResults" class="gif-scroll"></div>
        </section>

        <section id="preview-area">
            <div id="canvas">
                <p class="placeholder-text">Drag items here. Double-click text boxes to edit.</p>
            </div>
        </section>
    </main>

    <div id="exportModal" class="modal" style="display:none;">
        <div class="modal-content card">
            <h3>Generated CSS/HTML</h3>
            <p>Copy this code into your project files:</p>
            <textarea id="codeOutput" readonly></textarea>
            <button id="closeModal">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
