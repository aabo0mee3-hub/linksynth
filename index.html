<main class="container">
    <section class="card">
        <h3>Quick Preset Formats</h3>
        <div class="input-group">
            <button class="preset-btn" data-theme="minimal">Minimalist</button>
            <button class="preset-btn" data-theme="glass">Glassmorphism</button>
            <button class="preset-btn" data-theme="dark">Midnight Dark</button>
            <button class="preset-btn" data-theme="retro">Retro Terminal</button>
        </div>
    </section>

    <section class="card">
        <h3>Add Asset (Include https://)</h3>
        <div class="input-group">
            <input type="text" id="linkInput" placeholder="Paste CSS or Image URL...">
            <select id="assetType">
                <option value="theme">Theme (CSS)</option>
                <option value="image">Image URL</option>
            </select>
            <button id="addBtn">Save to Repo</button>
        </div>
        <div id="linkList" class="grid"></div>
    </section>

    <section class="card">
        <h3>Creative Tools & GIFs</h3>
        <div class="input-group">
            <input type="color" id="colorPicker" title="Canvas BG">
            <button onclick="document.getElementById('imageImporter').click()">+ Upload Image</button>
            <input type="file" id="imageImporter" style="display:none" accept="image/*">
        </div>
        <div class="sticker-panel">
            <div class="gif-search-box">
                <input type="text" id="gifSearch" placeholder="Search Giphy...">
                <button id="searchGifBtn">Find GIFs</button>
            </div>
            <div id="gifResults" class="gif-scroll"></div>
        </div>
    </section>

    <section id="preview-area">
        <div class="preview-header">
            <h2>Live Prototype Canvas</h2>
            <button id="applyThemeBtn">Sync Repo Themes</button>
        </div>
        <div id="canvas">
            <p class="placeholder-text">Drag assets here or apply presets.</p>
        </div>
    </section>
</main>
