<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSynth | Prototype Repository</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>LinkSynth Builder</h1>
        <p>Gather assets, themed links, and generate rapid prototypes.</p>
    </header>

    <main class="container">
        <section id="input-area">
            <div class="card">
                <h3>Add New Asset Link</h3>
                <div class="input-group">
                    <input type="text" id="linkInput" placeholder="https://example.com/asset-or-theme">
                    <select id="assetType">
                        <option value="theme">Theme/CSS</option>
                        <option value="image">Image Asset</option>
                        <option value="reference">Reference Site</option>
                    </select>
                    <button id="addBtn">Add to Repository</button>
                </div>
            </div>
        </section>

        <section id="repository">
            <h2>Current Repository</h2>
            <div id="linkList" class="grid">
                </div>
            <button id="clearBtn" class="secondary">Clear Session</button>
        </section>

        <section id="preview-area">
            <div class="preview-header">
                <h2>Prototype Preview</h2>
                <button id="generateBtn">Generate Test Page</button>
            </div>
            <div id="previewContainer">
                <div id="canvas">
                    <p class="placeholder-text">Click "Generate" to import formatting and links into this canvas.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
