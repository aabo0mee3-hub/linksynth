<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkSynth | Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="card">
            <h3>Add Asset (Use https://)</h3>
            <div class="input-group">
                <input type="text" id="linkInput" placeholder="https://cdn.example.com/style.css">
                <select id="assetType">
                    <option value="theme">Theme (CSS)</option>
                    <option value="image">Image URL</option>
                </select>
                <button id="addBtn">Save to Repo</button>
            </div>
            <div id="linkList" class="grid"></div>
        </section>

        <section class="card">
            <h3>Creative Tools</h3>
            <div class="input-group">
                <input type="color" id="colorPicker">
                <select id="fontPicker">
                    <option value="sans-serif">Modern</option>
                    <option value="serif">Classic</option>
                </select>
                <button onclick="document.getElementById('imageImporter').click()">+ Upload</button>
                <input type="file" id="imageImporter" style="display:none">
            </div>
            <div class="sticker-panel">
                <div class="sticker-row">
                    <button class="sticker-btn" data-val="⭐">⭐</button>
                    <button class="sticker-btn" data-val="🚀">🚀</button>
                </div>
                <div class="gif-search-box">
                    <input type="text" id="gifSearch" placeholder="Search Giphy...">
                    <button id="searchGifBtn">Find GIFs</button>
                </div>
                <div id="gifResults" class="gif-scroll"></div>
            </div>
        </section>

        <section id="preview-area">
            <button id="applyThemeBtn">Apply Repository Themes</button>
            <div id="canvas">
                <p class="placeholder-text">Drag assets here.</p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
