<body>
    <header>
        <h1>LinkSynth Builder Pro</h1>
        <p>Design, drag, and export your website mockup code.</p>
    </header>

    <main class="container">
        <section class="card">
            <div class="input-group">
                <input type="text" id="textInput" placeholder="Enter text for a new box...">
                <button id="addTextBtn">Create Text Box</button>
                <button id="exportBtn" style="background: #10b981;">Export CSS/HTML</button>
            </div>
        </section>

        <section class="card">
            <h3>Layout Presets</h3>
            <div class="input-group">
                <button class="preset-btn" data-theme="minimal">Minimal</button>
                <button class="preset-btn" data-theme="glass">Glassmorphism</button>
                <button class="preset-btn" data-theme="dark">Midnight</button>
                <button class="preset-btn" data-theme="retro">Terminal</button>
            </div>
        </section>

        <section id="preview-area">
            <div id="canvas">
                <p class="placeholder-text">Click "Create Text Box" or add assets to start mockup.</p>
            </div>
        </section>
    </main>

    <div id="exportModal" class="modal" style="display:none;">
        <div class="modal-content card">
            <h3>Generated Mockup Code</h3>
            <textarea id="codeOutput" readonly style="width:100%; height:200px; font-family:monospace;"></textarea>
            <button onclick="document.getElementById('exportModal').style.display='none'">Close</button>
        </div>
    </div>
