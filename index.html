<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSynth Pro | Rapid Prototype Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>LinkSynth Builder</h1>
        <p>Gather assets, themed links, and generate rapid prototypes at a moments notice.</p>
    </header>

    <main class="container">
        <section class="card">
            <h3>Text & Export Tools</h3>
            <div class="input-group">
                <input type="text" id="textInput" placeholder="Headline or button text...">
                <button id="addTextBtn">Add Text Box</button>
                <button id="exportBtn" style="background: var(--accent);">Export CSS/HTML</button>
            </div>
        </section>

        <section class="card">
            <h3>Quick Style Presets</h3>
            <div class="input-group">
                <button class="preset-btn" data-theme="minimal">Minimal</button>
                <button class="preset-btn" data-theme="glass">Glassmorphism</button>
                <button class="preset-btn" data-theme="dark">Midnight</button>
                <button class="preset-btn" data-theme="retro">Retro</button>
            </div>
        </section>

        <section class="card">
            <h3>Add New Asset Link</h3>
            <div class="input-group">
                <input type="text" id="linkInput" placeholder="https://example.com/asset.css">
                <select id="assetType">
                    <option value="theme">Theme/CSS</option>
                    <option value="image">Image Asset</option>
                </select>
                <button id="addBtn">Save to Repo</button>
            </div>
            <div id="linkList" class="grid"></div>
        </section>

        <section class="card">
            <div class="gif-search-box">
                <input type="text" id="gifSearch" placeholder="Search Giphy...">
                <button id="searchGifBtn">Find GIFs</button>
            </div>
            <div id="gifResults" class="gif-scroll"></div>
        </section>

        <section id="preview-area">
            <div class="preview-header">
                <h2>Live Prototype Canvas</h2>
                <button id="applyThemeBtn">Import Formatting</button>
            </div>
            <div id="canvas">
                <p class="placeholder-text">Double-click text to edit. Drag to arrange.</p>
            </div>
        </section>
    </main>

    <div id="exportModal" class="modal" style="display:none;">
        <div class="modal-content card">
            <h3>Mockup Export Code</h3>
            <textarea id="codeOutput" readonly></textarea>
            <button id="closeModal">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
