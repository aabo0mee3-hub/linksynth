<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkSynth | Browser Page Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>LinkSynth Builder</h1>
        <p>Rapid Profiling: Stack assets and build dummy pages.</p>
    </header>

    <main class="container">
        <section class="card">
            <h3>1. Style Stack</h3>
            <div class="input-group">
                <input type="text" id="linkInput" placeholder="Paste CSS Link here...">
                <button id="addBtn">Add to Stack</button>
            </div>
            <div id="linkList" class="grid"></div>
        </section>

        <section class="card">
            <h3>2. Layout Components</h3>
            <div class="input-group">
                <button class="shape-btn" data-shape="rect">Add Section</button>
                <button class="shape-btn" data-shape="circle">Add Profile</button>
                <button id="addTextBtn">Add Text</button>
                <button onclick="document.getElementById('imageImporter').click()">+ Upload Image</button>
                <input type="file" id="imageImporter" style="display:none" accept="image/*">
            </div>
            <div class="theme-toggle">
                <span>Active Theme: </span>
                <button class="theme-btn" data-theme="light">Light Mode</button>
                <button class="theme-btn" data-theme="dark">Dark Mode</button>
            </div>
        </section>

        <div class="action-bar">
            <button id="launchDummyBtn" style="background: var(--accent);">🌐 Launch Dummy Page</button>
            <button id="clearCanvasBtn" style="background: #ef4444;">Clear Canvas</button>
        </div>

        <div id="canvas" class="light">
            <p class="placeholder-text">Drag items here to profile your layout.</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
