<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSynth | Prototype Repo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>LinkSynth Builder</h1>
        <p>Gather assets and synthesize prototypes in real-time.</p>
    </header>

    <main class="container">
        <section class="card">
            <h3>Add New Asset Link</h3>
            <div class="input-group">
                <input type="text" id="linkInput" placeholder="Paste CSS or Image URL here...">
                <select id="assetType">
                    <option value="theme">Theme (CSS)</option>
                    <option value="image">Image Asset</option>
                </select>
                <button id="addBtn">Save to Repo</button>
            </div>
            <div id="linkList" class="grid"></div>
        </section>

        <section class="card">
            <h3>Creative Toolbelt</h3>
            <div class="input-group">
                <input type="color" id="colorPicker" title="Canvas Background">
                <select id="fontPicker">
                    <option value="sans-serif">Modern Sans</option>
                    <option value="serif">Classic Serif</option>
                    <option value="monospace">Mono</option>
                </select>
                <button onclick="document.getElementById('imageImporter').click()">+ Upload File</button>
                <input type="file" id="imageImporter" accept="image/*" style="display:none">
            </div>
            
            <div class="sticker-panel">
                <div class="sticker-row">
                    <button class="sticker-btn" data-val="⭐">⭐</button>
                    <button class="sticker-btn" data-val="🚀">🚀</button>
                    <button class="sticker-btn" data-val="🔥">🔥</button>
                    <button class="sticker-btn" data-val="✨">✨</button>
                </div>
                <div class="gif-search-box">
                    <input type="text" id="gifSearch" placeholder="Search Giphy...">
                    <button id="searchGifBtn">Find GIFs</button>
                </div>
                <div id="gifResults" class="gif-scroll"></div>
            </div>
        </section>

        <section id="preview-area">
            <div class="preview-header">
                <h2>Live Prototype Canvas</h2>
                <button id="applyThemeBtn">Apply Repository Themes</button>
            </div>
            <div id="canvas">
                <p class="placeholder-text">Drag assets here. Click "Apply" to sync styles.</p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
